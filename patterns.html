<!doctype html>
<html>

<head>
  <link rel="stylesheet" href="patterns.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <div id="cardsContainer">
    <div id="card1" class="card"></div>
    <div id="card2" class="card"></div>
    <div id="card3" class="card"></div>
    <div id="card4" class="card"></div>
    <div id="card5" class="card"></div>
    <div id="card6" class="card"></div>
    <div id="card7" class="card"></div>
    <div id="card8" class="card"></div>
    <div id="card9" class="card"></div>
    <div id="card10" class="card"></div>
    <div id="card11" class="card"></div>
    <div id="card12" class="card"></div>
  </div>

  <div id="foundContainer">
    <p>Found sets: <span id="foundNo">0</span>/6</p>
    <div id="foundStrip">
      <div class="found-set-slot"><div class="found-card"></div><div class="found-card"></div><div class="found-card"></div></div>
      <div class="found-set-slot"><div class="found-card"></div><div class="found-card"></div><div class="found-card"></div></div>
      <div class="found-set-slot"><div class="found-card"></div><div class="found-card"></div><div class="found-card"></div></div>
      <div class="found-set-slot"><div class="found-card"></div><div class="found-card"></div><div class="found-card"></div></div>
      <div class="found-set-slot"><div class="found-card"></div><div class="found-card"></div><div class="found-card"></div></div>
      <div class="found-set-slot"><div class="found-card"></div><div class="found-card"></div><div class="found-card"></div></div>
    </div>
  </div>

  <script type="text/javascript" src="patterns.js"></script>

  <footer>
    <p><a href="https://github.com/hesara/set_trainer">Source code at Github (modified version by Henri Sara)</a></p>
    <p><a href="https://github.com/gestra/set_trainer">Original version at Github</a></p>
  </footer>
</body>

</html>
